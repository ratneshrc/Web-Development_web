<!DOCTYPE html>
<html>
<head>
  <title>Months and Days</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #e6ecf5, #f5f7fa);
      text-align: center;
    }

    .info {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    table {
      border-collapse: collapse;
      width: 50%;
      margin: 30px auto;
      background: white;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    caption {
      background: linear-gradient(to right, #4a6fa5, #6c8fc7);
      color: white;
      padding: 10px;
      font-size: 20px;
      font-weight: bold;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: center;
    }

    th {
      background-color: #5b86e5;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f2f6fb;
    }

    tr:hover {
      background-color: #dce6f7;
    }
  </style>
</head>

<body>

<div class="info">
  Experiment No: 08 <br>
  Name: Ratnesh Chavan <br>
  Class: SY CSE A <br>
  Roll No: 57
</div>

<table>
  <caption>Months and Number of Days</caption>

  <tr>
    <th>Month</th>
    <th>Total Days</th>
  </tr>

  <tr><td>January</td><td>31</td></tr>
  <tr><td>February</td><td>28 / 29</td></tr>
  <tr><td>March</td><td>31</td></tr>
  <tr><td>April</td><td>30</td></tr>
  <tr><td>May</td><td>31</td></tr>
  <tr><td>June</td><td>30</td></tr>
  <tr><td>July</td><td>31</td></tr>
  <tr><td>August</td><td>31</td></tr>
  <tr><td>September</td><td>30</td></tr>
  <tr><td>October</td><td>31</td></tr>
  <tr><td>November</td><td>30</td></tr>
  <tr><td>December</td><td>31</td></tr>

</table>

</body>
</html>
